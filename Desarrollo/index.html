<main>
    <article class="title2">
        <h2>¡Crea tu paleta de colores !</h2>
    </article>

    <article>
        <form id="paletteForm">
            <fieldset class="color-options">
                <legend class="typeColor">Tipo de color</legend>
                <input type="radio" id="rgb" name="format" value="rgb" />
                <label for="rgb">RGB</label>

                <input type="radio" id="hsl" name="format" value="hsl" />
                <label for="hsl">HSL</label>

                <input type="radio" id="hex" name="format" value="hex" />
                <label for="hex">HEX</label>
            </fieldset>
        
            <fieldset>
            <legend class="typeColor">Tamaño de paleta</legend>
            <input type="radio" id="size6" name="size" value="6" />
            <label for="size6">6</label>
            <input type="radio" id="size8" name="size" value="8" />
            <label for="size8">8</label>
            <input type="radio" id="size9" name="size" value="9" />
            <label for="size9">9</label>
            </fieldset>

            <button id="generate">Generar paleta</button>

        </form>
    </article>
    <div id="palette"></div>
    <div id="mensaje-copiado"></div>
</main>
